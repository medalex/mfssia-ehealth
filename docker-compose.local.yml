services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mfssia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mfssia?sslmode=disable
      DATABASE_MIGRATIONS_RUN: "true"

volumes:
  pgdata:
